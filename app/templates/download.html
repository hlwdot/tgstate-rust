<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file.filename }} - tgState</title>
    <link rel="stylesheet" href="/static/ui.css?v=5.2">
    <script src="/static/ui.js?v=5.2"></script>
    <script>
        (function() {
            const pref = localStorage.getItem('tgstate_theme_pref') || 'auto';
            let mode = pref;
            if (pref === 'auto') mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', mode);
            document.documentElement.classList.toggle('dark', mode === 'dark');
        })();
    </script>
</head>
<body>
    <div class="bg-orbs" aria-hidden="true"></div>
    <main class="standalone-page">
        <div class="standalone-wrap" style="width:min(100%,620px);">
            <section class="standalone-card wide" style="text-align:center;">
                <h2 class="standalone-title" style="font-size:22px;word-break:break-all;">{{ file.filename }}</h2>
                <p class="standalone-subtitle">
                    {{ file.filesize_mb }} MB · {{ file.upload_date_short }}
                </p>

                <a href="{{ file.file_url }}" class="btn btn-primary" style="display:flex;width:100%;min-height:52px;font-size:16px;margin-bottom:26px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="m7 10 5 5 5-5"></path><path d="M12 15V3"></path></svg>
                    Download Now
                </a>

                <div style="border-top:1px solid var(--border-color);padding-top:22px;text-align:left;">
                    <div class="input-group">
                        <label class="input-label">Direct Link</label>
                        <div style="display:flex;gap:8px;">
                            <input type="text" class="input-field" value="{{ file.file_url }}" readonly id="link-url">
                            <button class="btn btn-secondary" onclick="Utils.copy(document.getElementById('link-url').value)">Copy</button>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Markdown</label>
                        <div style="display:flex;gap:8px;">
                            <input type="text" class="input-field" value="{{ file.markdown_code }}" readonly id="link-md">
                            <button class="btn btn-secondary" onclick="Utils.copy(document.getElementById('link-md').value)">Copy</button>
                        </div>
                    </div>
                    <div class="input-group" style="margin-bottom:0;">
                        <label class="input-label">HTML</label>
                        <div style="display:flex;gap:8px;">
                            <input type="text" class="input-field" value="{{ file.html_code }}" readonly id="link-html">
                            <button class="btn btn-secondary" onclick="Utils.copy(document.getElementById('link-html').value)">Copy</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
