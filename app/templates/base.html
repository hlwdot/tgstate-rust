<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}tgState{% endblock %}</title>
    <link rel="stylesheet" href="/static/ui.css?v=5.2">
    <script>
        (function() {
            const pref = localStorage.getItem('tgstate_theme_pref') || 'auto';
            let mode = pref;
            if (pref === 'auto') {
                mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', mode);
            document.documentElement.classList.toggle('dark', mode === 'dark');
        })();
    </script>
</head>
<body>
    <div class="bg-orbs" aria-hidden="true">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <div class="app-layout">
        <header class="topbar">
            <div class="topbar-inner">
                <a href="/" class="brand" aria-label="tgState home">
                    <span class="brand-avatar">
                        <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="m17 8-5-5-5 5"></path><path d="M12 3v12"></path></svg>
                    </span>
                    <span class="brand-copy">
                        <span class="brand-title">tgState</span>
                        <span class="brand-subtitle">Telegram private storage console</span>
                    </span>
                </a>

                <nav class="topbar-nav" aria-label="Primary navigation">
                    <a href="/" class="nav-item {% if request_path == '/' or request_path == '/files' %}active{% endif %}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path></svg>
                        Files
                    </a>
                    <a href="/image_hosting" class="nav-item {% if request_path is starting_with('/image_hosting') %}active{% endif %}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="m21 15-5-5L5 21"></path></svg>
                        Images
                    </a>
                    <a href="/settings" class="nav-item {% if request_path is starting_with('/settings') %}active{% endif %}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path><path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.2 2.2 0 0 1-3.12 3.12l-.04-.04a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.66V21.5a2.2 2.2 0 1 1-4.4 0v-.1a1.8 1.8 0 0 0-1.1-1.66 1.8 1.8 0 0 0-1.98.36l-.04.04a2.2 2.2 0 0 1-3.12-3.12l.04-.04A1.8 1.8 0 0 0 3.34 15a1.8 1.8 0 0 0-1.66-1.1h-.1a2.2 2.2 0 1 1 0-4.4h.1a1.8 1.8 0 0 0 1.66-1.1 1.8 1.8 0 0 0-.36-1.98l-.04-.04a2.2 2.2 0 0 1 3.12-3.12l.04.04a1.8 1.8 0 0 0 1.98.36 1.8 1.8 0 0 0 1.1-1.66v-.1a2.2 2.2 0 1 1 4.4 0v.1a1.8 1.8 0 0 0 1.1 1.66 1.8 1.8 0 0 0 1.98-.36l.04-.04a2.2 2.2 0 0 1 3.12 3.12l-.04.04a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.66 1.1h.1a2.2 2.2 0 1 1 0 4.4h-.1A1.8 1.8 0 0 0 19.4 15Z"></path></svg>
                        Settings
                    </a>
                </nav>

                <div class="topbar-actions">
                    <button type="button" class="btn btn-ghost btn-icon theme-toggle-btn" title="Switch theme" aria-label="Switch theme">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 7.4A9 9 0 1 1 12 3Z"></path></svg>
                    </button>
                    <button type="button" onclick="Auth.logout()" class="btn btn-ghost btn-icon" style="color: var(--danger-color);" title="Log out" aria-label="Log out">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="m16 17 5-5-5-5"></path><path d="M21 12H9"></path></svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <nav class="mobile-nav" aria-label="Mobile navigation">
            <a href="/" class="mobile-nav-item {% if request_path == '/' or request_path == '/files' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path></svg>
                Files
            </a>
            <a href="/image_hosting" class="mobile-nav-item {% if request_path is starting_with('/image_hosting') %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="m21 15-5-5L5 21"></path></svg>
                Images
            </a>
            <a href="/settings" class="mobile-nav-item {% if request_path is starting_with('/settings') %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path><path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.2 2.2 0 0 1-3.12 3.12l-.04-.04a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.66V21.5a2.2 2.2 0 1 1-4.4 0v-.1a1.8 1.8 0 0 0-1.1-1.66 1.8 1.8 0 0 0-1.98.36l-.04.04a2.2 2.2 0 0 1-3.12-3.12l.04-.04A1.8 1.8 0 0 0 3.34 15a1.8 1.8 0 0 0-1.66-1.1h-.1a2.2 2.2 0 1 1 0-4.4h.1a1.8 1.8 0 0 0 1.66-1.1 1.8 1.8 0 0 0-.36-1.98l-.04-.04a2.2 2.2 0 0 1 3.12-3.12l.04.04a1.8 1.8 0 0 0 1.98.36 1.8 1.8 0 0 0 1.1-1.66v-.1a2.2 2.2 0 1 1 4.4 0v.1a1.8 1.8 0 0 0 1.1 1.66 1.8 1.8 0 0 0 1.98-.36l.04-.04a2.2 2.2 0 0 1 3.12 3.12l-.04.04a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.66 1.1h.1a2.2 2.2 0 1 1 0 4.4h-.1A1.8 1.8 0 0 0 19.4 15Z"></path></svg>
                Settings
            </a>
        </nav>
    </div>
    <script src="/static/ui.js?v=5.2"></script>
</body>
</html>
