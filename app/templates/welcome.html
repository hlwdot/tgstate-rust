<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - tgState</title>
    <link rel="stylesheet" href="/static/ui.css?v=5.2">
    <script src="/static/ui.js?v=5.2"></script>
    <script>
        (function() {
            const pref = localStorage.getItem('tgstate_theme_pref') || 'auto';
            let mode = pref;
            if (pref === 'auto') mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', mode);
            document.documentElement.classList.toggle('dark', mode === 'dark');
        })();
    </script>
</head>
<body>
    <div class="bg-orbs" aria-hidden="true"></div>
    <main class="standalone-page">
        <div class="standalone-wrap">
            <section class="standalone-card">
                <h1 class="standalone-title">Initial Setup</h1>
                <p class="standalone-subtitle">Create the admin password to continue.</p>
                <form id="setup-form" onsubmit="return false;">
                    <div class="input-group">
                        <label class="input-label">Admin Password</label>
                        <input type="password" class="input-field" id="password" placeholder="Use a strong password" required autofocus>
                        <div class="text-sm text-muted mt-4">This password protects the management console.</div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;min-height:48px;font-size:15px;" onclick="submitSetup()">
                        Complete Setup
                    </button>
                </form>
            </section>
        </div>
    </main>

    <script>
        async function submitSetup() {
            const pwd = document.getElementById('password').value;
            if (!pwd) { Toast.show('Enter a password', 'error'); return; }

            const btn = document.querySelector('button[type="submit"]');
            Utils.setLoading(btn, true);

            try {
                const res = await fetch('/api/set-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ password: pwd })
                });
                if (!res.ok) { Toast.show('Setup failed', 'error'); return; }

                Toast.show('Setup complete. Signing in...');

                const loginRes = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ password: pwd })
                });

                if (loginRes.ok) {
                    setTimeout(() => window.location.href = '/', 800);
                } else {
                    Toast.show('Auto sign-in failed. Please log in manually', 'error');
                    setTimeout(() => window.location.href = '/login', 1500);
                }
            } catch (e) {
                Toast.show('Network error', 'error');
            } finally {
                Utils.setLoading(btn, false);
            }
        }
    </script>
</body>
</html>
