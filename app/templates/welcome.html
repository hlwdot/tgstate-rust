<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - tgState</title>
    <link rel="stylesheet" href="/static/ui.css?v=5.2">
    <script src="/static/ui.js?v=5.2"></script>
    <script>
        (function() {
            const pref = localStorage.getItem('tgstate_theme_pref') || 'auto';
            let mode = pref;
            if (pref === 'auto') mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', mode);
            document.documentElement.classList.toggle('dark', mode === 'dark');
        })();
    </script>
</head>
<body>
    <div class="bg-orbs" aria-hidden="true"></div>
    <main class="standalone-page">
        <div class="standalone-wrap">
            <section class="standalone-card">
                <h1 class="standalone-title">OIDC Required</h1>
                <p class="standalone-subtitle">Configure Authelia OIDC environment variables, then restart tgState.</p>

                <div class="input-group">
                    <label class="input-label">Redirect URI</label>
                    <input type="text" class="input-field" id="redirect-uri" readonly>
                    <div class="text-sm text-muted mt-4">Register this URL in the Authelia OIDC client.</div>
                </div>

                <a href="/login" class="btn btn-primary" style="width:100%;min-height:48px;font-size:15px;justify-content:center;">Go to Sign In</a>
            </section>
        </div>
    </main>

    <script>
        document.getElementById('redirect-uri').value = `${window.location.origin}/api/auth/callback`;
    </script>
</body>
</html>
