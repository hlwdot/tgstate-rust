<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - tgState</title>
    <link rel="stylesheet" href="/static/ui.css?v=5.2">
    <script src="/static/ui.js?v=5.2"></script>
    <script>
        (function() {
            const pref = localStorage.getItem('tgstate_theme_pref') || 'auto';
            let mode = pref;
            if (pref === 'auto') mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', mode);
            document.documentElement.classList.toggle('dark', mode === 'dark');
        })();
    </script>
</head>
<body>
    <div class="bg-orbs" aria-hidden="true"></div>
    <main class="standalone-page">
        <div class="standalone-wrap">
            <section class="standalone-card">
                <h1 class="standalone-title">Welcome Back</h1>
                <p class="standalone-subtitle">Enter the admin password to continue.</p>

                <form id="login-form" onsubmit="return false;">
                    <div class="input-group">
                        <label class="input-label">Password</label>
                        <input type="password" class="input-field" id="password" name="password" placeholder="Enter password" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;min-height:48px;font-size:15px;" onclick="submitLogin()">Log In</button>
                </form>
            </section>
        </div>
    </main>

    <script>
    async function submitLogin() {
        const pwd = document.getElementById('password').value;
        if (!pwd) return;
        const btn = document.querySelector('button[type="submit"]');
        Utils.setLoading(btn, true);
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: pwd })
            });
            if (res.ok) {
                window.location.replace('/');
            } else {
                Toast.show('Incorrect password', 'error');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        } catch (e) {
            Toast.show('Network error', 'error');
        } finally {
            Utils.setLoading(btn, false);
        }
    }
    </script>
</body>
</html>
