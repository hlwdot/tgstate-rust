<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - tgState</title>
    <link rel="stylesheet" href="/static/ui.css?v=5.2">
    <script src="/static/ui.js?v=5.2"></script>
    <script>
        (function() {
            const pref = localStorage.getItem('tgstate_theme_pref') || 'auto';
            let mode = pref;
            if (pref === 'auto') mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', mode);
            document.documentElement.classList.toggle('dark', mode === 'dark');
        })();
    </script>
</head>
<body>
    <div class="bg-orbs" aria-hidden="true"></div>
    <main class="standalone-page">
        <div class="standalone-wrap">
            <section class="standalone-card">
                <h1 class="standalone-title">Welcome Back</h1>
                <p class="standalone-subtitle">Sign in with Authelia to continue.</p>

                {% if oidc_configured %}
                <a id="login-button" href="/api/auth/login" class="btn btn-primary" style="width:100%;min-height:48px;font-size:15px;justify-content:center;">Continue with Authelia</a>
                {% else %}
                <a href="/welcome" class="btn btn-primary" style="width:100%;min-height:48px;font-size:15px;justify-content:center;">Open Setup</a>
                {% endif %}
            </section>
        </div>
    </main>

    <script>
    (function() {
        const params = new URLSearchParams(window.location.search);
        const err = params.get('error');
        if (err && window.Toast) Toast.show(err, 'error');

        const btn = document.getElementById('login-button');
        if (btn) {
            const next = params.get('next');
            if (next) btn.href = `/api/auth/login?next=${encodeURIComponent(next)}`;
        }
    })();
    </script>
</body>
</html>
